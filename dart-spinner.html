<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 다트 스피너</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0f0e17;color:#fff;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:20px 16px;
}
.phase{display:none;width:100%;max-width:520px;}
.phase.active{display:block;}

/* ── SETUP ── */
.logo{font-size:26px;font-weight:700;margin-bottom:4px;}
.logo span{color:#f15bb5;}
.tagline{font-size:13px;color:rgba(255,255,255,.42);margin-bottom:28px;line-height:1.65;}
.count-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:28px;}
.count-label{font-size:15px;color:rgba(255,255,255,.6);}
.cnt-btn{width:40px;height:40px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fff;font-size:20px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.cnt-btn:hover{background:rgba(255,255,255,.13);}
.cnt-num{font-size:32px;font-weight:800;width:64px;text-align:center;color:#f15bb5;}
.names-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.nrow{display:flex;align-items:center;gap:8px;}
.ndot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.nrow input{flex:1;min-width:0;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 10px;font-size:13px;color:#fff;font-family:inherit;outline:none;transition:border-color .15s;}
.nrow input:focus{border-color:rgba(255,255,255,.28);}
.nrow input::placeholder{color:rgba(255,255,255,.18);}
.btn{padding:11px 18px;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;border:none;transition:transform .08s;}
.btn:active{transform:scale(.97);}
.bp{background:#fff;color:#0f0e17;width:100%;}
.bs{background:rgba(255,255,255,.07);color:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.12);}
.brow{display:flex;gap:10px;margin-top:12px;}

/* ── GAME ── */
.ghdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.rlabel{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.07em;text-transform:uppercase;}
.rnum{font-size:18px;font-weight:800;}
.ctag{display:flex;align-items:center;gap:7px;}
.cdot{width:11px;height:11px;border-radius:50%;}
.cname{font-size:14px;font-weight:700;}
canvas{display:block;width:100%;border-radius:12px;}
.rdots{display:flex;justify-content:center;gap:8px;margin:10px 0 4px;}
.rdot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);transition:background .3s,border-color .3s;}
.rdot.done{background:rgba(255,255,255,.45);border-color:transparent;}
.rdot.cur{border-color:rgba(255,255,255,.7);animation:dp .65s ease-in-out infinite alternate;}
@keyframes dp{from{opacity:.4}to{opacity:1}}
.sbar{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.schip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.1);font-size:11px;}
.sdot{width:7px;height:7px;border-radius:50%;}

/* ── RESULT ── */
.rrow{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;font-size:13px;margin-bottom:6px;}
.rrow.loser{border-color:rgba(241,91,181,.4);background:rgba(241,91,181,.07);}
.rrank{font-size:20px;width:30px;text-align:center;flex-shrink:0;}
.rname{flex:1;font-weight:600;line-height:1.6;}
.rsub{font-size:11px;color:rgba(255,255,255,.35);display:block;font-weight:400;}
.rscore{font-size:16px;font-weight:800;flex-shrink:0;}
.ad{width:100%;max-width:520px;height:54px;border:1px dashed rgba(255,255,255,.07);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,.13);margin-bottom:14px;}
.hlink{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:rgba(255,255,255,.35);text-decoration:none;margin-bottom:14px;transition:color .2s;}
.hlink:hover{color:rgba(255,255,255,.7);}
</style>
</head>
<body>

<div class="ad">광고 영역 320×50</div>

<!-- SETUP -->
<div class="phase active" id="ph-input">
  <a href="index.html" class="hlink">← 내기판 홈</a>
  <div class="logo">🎯 다트 <span>스피너</span></div>
  <div class="tagline">매 라운드 모두 한 번씩 던집니다.<br>5라운드 합산 — 가장 낮은 사람이 벌칙!</div>
  <div class="count-row">
    <span class="count-label">인원수</span>
    <div style="display:flex;align-items:center;">
      <button class="cnt-btn" onclick="setCount(playerCount-1)">−</button>
      <div class="cnt-num" id="cnt-display">4</div>
      <button class="cnt-btn" onclick="setCount(playerCount+1)">+</button>
    </div>
    <span class="count-label">명</span>
  </div>
  <div class="names-grid" id="nlist"></div>
  <button class="btn bp" onclick="startGame()">🎯 게임 시작</button>
</div>

<!-- GAME -->
<div class="phase" id="ph-game">
  <div class="ghdr">
    <div>
      <div class="rlabel">ROUND</div>
      <div class="rnum" id="rnum">1 / 5</div>
    </div>
    <div class="ctag">
      <div class="cdot" id="cdot"></div>
      <span class="cname" id="cname">-</span>
    </div>
  </div>
  <canvas id="gc"></canvas>
  <div class="rdots" id="rdots"></div>
  <div class="sbar" id="sbar"></div>
</div>

<!-- RESULT -->
<div class="phase" id="ph-result">
  <div id="rcontent"></div>
  <div class="brow">
    <a href="index.html" class="btn bs" style="display:flex;align-items:center;justify-content:center;text-decoration:none;">🏠 홈으로</a>
    <button class="btn bs" onclick="showPhase('ph-input')">처음으로</button>
    <button class="btn bp" onclick="restartGame()">다시 하기 →</button>
  </div>
</div>

<script>
// ═══ CONSTANTS ═══
const COLORS=['#FF6B6B','#4ECDC4','#F7DC6F','#5DADE2','#C39BD3','#FD9644','#2ECC71','#EC407A','#00BCD4','#FF7043'];
const NUMS=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
const ROUNDS=5;
const SPIN=0.014;
const G={be:.04,bl:.10,tI:.56,tO:.63,dI:.90,dO:1.00};
const SEG=2*Math.PI/20;
const SOFF=-Math.PI/2-SEG/2;

// ═══ STATE ═══
let playerCount=4;
let nameInputs=[];
let players=[],scores=[];
// round: 0-indexed current round. cP: current player in round.
let round=0,cP=0;
let bAng=0,animId;
let dart=null;     // flying dart {sx,sy,tx,ty,r,ta,t,done}
let roundPins=[];  // [{x,y,col}] — all darts this round, persist until new round
let popup=null;    // score popup {x,y,py,label,sub,alpha}
let overlay=null;  // 'round-start' | 'round-end' | null
let cv,ctx,cx,cy,R;

// ═══ SETUP ═══
function setCount(n){
  playerCount=Math.max(2,Math.min(10,n));
  document.getElementById('cnt-display').textContent=playerCount;
  const old=[...document.querySelectorAll('#nlist input')].map(el=>el.value);
  nameInputs=Array.from({length:playerCount},(_,i)=>old[i]||'');
  document.getElementById('nlist').innerHTML=nameInputs.map((v,i)=>`
    <div class="nrow">
      <div class="ndot" style="background:${COLORS[i%10]}"></div>
      <input type="text" placeholder="${i+1}P" maxlength="8"
        value="${v}" oninput="nameInputs[${i}]=this.value">
    </div>`).join('');
}

// ═══ START ═══
function startGame(){
  players=Array.from({length:playerCount},(_,i)=>({
    name:nameInputs[i]||`${i+1}P`,color:COLORS[i%10],
  }));
  scores=players.map(()=>[]);
  round=0;cP=0;roundPins=[];dart=null;popup=null;overlay=null;

  showPhase('ph-game');
  resize();updateBar();updateHdr();updateRoundDots();
  cancelAnimationFrame(animId);loop();
  setTimeout(()=>beginRound(),450);
}

function showPhase(id){
  document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function resize(){
  cv=document.getElementById('gc');ctx=cv.getContext('2d');
  const w=Math.min(window.innerWidth-32,520);
  cv.width=w;cv.height=Math.round(w*.9);
  cx=w/2;cy=cv.height/2-8;R=Math.min(w,cv.height)*.40;
}

// ═══ AUTO SEQUENCE ═══
// beginRound → overlay 'round-start' (1.3s) → fire player 0 dart
// → onLand → next player dart (0.5s gap) → ... → last player done
//   → (if more rounds) overlay 'round-end' (2.4s) → clear pins → beginRound
//   → (if final round) showResult

function beginRound(){
  overlay='round-start';
  updateHdr();updateRoundDots();
  setTimeout(()=>{overlay=null;setTimeout(()=>fireThrow(),350);},1300);
}

function fireThrow(){
  const r=randR();
  const ta=Math.random()*Math.PI*2;
  dart={sx:cx,sy:cv.height+30,tx:cx+r*R*Math.cos(ta),ty:cy+r*R*Math.sin(ta),r,ta,t:0,done:false};
}

function onLand(){
  const {score,label}=calcScore(dart.r,dart.ta,bAng);
  roundPins.push({x:dart.tx,y:dart.ty,col:players[cP].color});
  popup={x:dart.tx,y:dart.ty-R*.18,py:dart.ty-R*.18,label,sub:`+${score}점`,alpha:1};
  scores[cP].push(score);
  updateBar();

  const lastPlayer=cP===players.length-1;

  setTimeout(()=>{
    dart=null;
    if(lastPlayer){
      // Round complete
      popup=null;
      round++;cP=0;
      if(round>=ROUNDS){
        cancelAnimationFrame(animId);
        setTimeout(showResult,350);
      } else {
        overlay='round-end';
        updateRoundDots();
        setTimeout(()=>{overlay=null;roundPins=[];beginRound();},2400);
      }
    } else {
      cP++;
      updateHdr();
      setTimeout(()=>fireThrow(),500);
    }
  },1100);
}

// ═══ SCORE ═══
function randR(){
  const x=Math.random();
  if(x<.04) return Math.random()*G.be;
  if(x<.10) return G.be+Math.random()*(G.bl-G.be);
  if(x<.28) return G.bl+Math.random()*(G.tI-G.bl);
  if(x<.45) return G.tI+Math.random()*(G.tO-G.tI);   // triple
  if(x<.77) return G.tO+Math.random()*(G.dI-G.tO);
  if(x<.92) return G.dI+Math.random()*(G.dO-G.dI);   // double
  return G.dO+.01+Math.random()*.07;                   // miss
}
function calcScore(r,ta,ang){
  if(r<G.be) return{score:50,label:'🎯 BULLSEYE!'};
  if(r<G.bl) return{score:25,label:'🟢 Bull 25'};
  if(r>=G.dO) return{score:0,label:'💨 미스'};
  const tl=((ta-ang-SOFF)/SEG%20+20)%20;
  const num=NUMS[Math.floor(tl)];
  if(r>=G.tI&&r<G.tO) return{score:num*3,label:`🔥 Triple ${num}`};
  if(r>=G.dI&&r<G.dO) return{score:num*2,label:`✨ Double ${num}`};
  return{score:num,label:`${num}점`};
}

// ═══ LOOP ═══
function loop(){update();draw();animId=requestAnimationFrame(loop);}
function update(){
  bAng+=SPIN;
  if(dart){
    dart.t=Math.min(dart.t+0.038,1);
    if(dart.t>=1&&!dart.done){dart.done=true;onLand();}
  }
  if(popup){popup.alpha-=0.011;popup.py-=0.3;if(popup.alpha<=0)popup=null;}
}

// ═══ DRAW ═══
function draw(){
  if(!ctx)return;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#0a0a12';ctx.fillRect(0,0,cv.width,cv.height);

  drawBoard();
  // All this round's darts (pinholes visible under overlay too)
  roundPins.forEach(p=>drawPin(p.x,p.y,p.col));

  // Flying dart — only while in flight
  if(dart&&dart.t<1&&!overlay){
    const e=1-Math.pow(1-dart.t,2.8);
    const x=dart.sx+(dart.tx-dart.sx)*e;
    const y=dart.sy+(dart.ty-dart.sy)*e;
    drawFlyDart(x,y,Math.atan2(dart.ty-dart.sy,dart.tx-dart.sx));
  }

  // Score popup
  if(popup&&popup.alpha>0&&!overlay){
    const a=Math.min(1,popup.alpha);
    ctx.save();ctx.globalAlpha=a;ctx.textAlign='center';
    const fs=Math.max(12,Math.round(R*.13));
    ctx.shadowColor='#000';ctx.shadowBlur=8;
    ctx.font=`bold ${fs}px sans-serif`;ctx.fillStyle='#ffd700';
    ctx.fillText(popup.label,popup.x,popup.py);
    ctx.font=`bold ${Math.round(fs*1.5)}px sans-serif`;ctx.fillStyle='#fff';
    ctx.fillText(popup.sub,popup.x,popup.py+fs*1.45);
    ctx.restore();
  }

  if(overlay) drawOverlay();
}

// ── Board ──
function drawBoard(){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(bAng);
  ctx.beginPath();ctx.arc(0,0,R*1.09,0,Math.PI*2);ctx.fillStyle='#3d2a0e';ctx.fill();
  ctx.beginPath();ctx.arc(0,0,R*1.02,0,Math.PI*2);ctx.fillStyle='#242424';ctx.fill();
  for(let i=0;i<20;i++){
    const a0=SOFF+i*SEG,a1=a0+SEG,odd=i%2;
    farc(G.dI*R,G.dO*R,a0,a1,odd?'#c41c1c':'#1a6e1a');
    farc(G.tO*R,G.dI*R,a0,a1,odd?'#ddd6b0':'#1a1a1a');
    farc(G.tI*R,G.tO*R,a0,a1,odd?'#c41c1c':'#1a6e1a');
    farc(G.bl*R,G.tI*R,a0,a1,odd?'#ddd6b0':'#1a1a1a');
  }
  ctx.strokeStyle='rgba(255,190,60,.35)';
  [G.bl,G.tI,G.tO,G.dI,G.dO].forEach(r=>{
    ctx.beginPath();ctx.arc(0,0,r*R,0,Math.PI*2);ctx.lineWidth=1.5;ctx.stroke();
  });
  ctx.lineWidth=1;
  for(let i=0;i<20;i++){
    const a=SOFF+i*SEG;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*G.bl*R,Math.sin(a)*G.bl*R);
    ctx.lineTo(Math.cos(a)*G.dO*R,Math.sin(a)*G.dO*R);
    ctx.stroke();
  }
  ctx.beginPath();ctx.arc(0,0,G.bl*R,0,Math.PI*2);ctx.fillStyle='#1a6e1a';ctx.fill();
  ctx.strokeStyle='rgba(255,190,60,.4)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,G.be*R,0,Math.PI*2);ctx.fillStyle='#c41c1c';ctx.fill();
  const nr=R*1.055,fs=Math.max(9,Math.round(R*.125));
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<20;i++){
    const ma=SOFF+(i+.5)*SEG;
    ctx.save();
    ctx.translate(Math.cos(ma)*nr,Math.sin(ma)*nr);
    ctx.rotate(-bAng);
    ctx.font=`bold ${fs}px sans-serif`;
    ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=4;
    ctx.fillStyle='#fff';ctx.fillText(NUMS[i],0,0);
    ctx.restore();
  }
  ctx.restore();
}
function farc(r0,r1,a0,a1,col){
  ctx.beginPath();ctx.arc(0,0,r1,a0,a1);ctx.arc(0,0,r0,a1,a0,true);
  ctx.closePath();ctx.fillStyle=col;ctx.fill();
}
function drawFlyDart(x,y,ang){
  ctx.save();ctx.translate(x,y);ctx.rotate(ang+Math.PI/2);
  const L=R*.13;
  ctx.beginPath();ctx.moveTo(0,-L*.5);ctx.lineTo(0,L*.3);
  ctx.lineWidth=2.5;ctx.strokeStyle='#ccc';ctx.stroke();
  ctx.beginPath();ctx.arc(0,-L*.5,2.5,0,Math.PI*2);ctx.fillStyle='#888';ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0,L*.2);ctx.lineTo(-L*.18,L*.45);ctx.lineTo(0,L*.3);ctx.lineTo(L*.18,L*.45);ctx.closePath();
  ctx.fillStyle=players[cP]?.color||'#fff';ctx.fill();
  ctx.restore();
}
function drawPin(x,y,col){
  ctx.save();ctx.translate(x,y);
  const L=R*.09;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-L);
  ctx.lineWidth=2;ctx.strokeStyle=col;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fillStyle='#999';ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0,-L*.65);ctx.lineTo(-L*.15,-L);ctx.lineTo(0,-L*.8);ctx.lineTo(L*.15,-L);ctx.closePath();
  ctx.fillStyle=col;ctx.fill();
  ctx.restore();
}

// ── Overlays ──
function drawOverlay(){
  ctx.fillStyle='rgba(10,10,18,.88)';
  ctx.fillRect(0,0,cv.width,cv.height);
  if(overlay==='round-start') drawRoundStart();
  else if(overlay==='round-end') drawRoundEnd();
}

function drawRoundStart(){
  ctx.textAlign='center';
  const fs=Math.max(11,Math.round(R*.115));
  ctx.font=`${fs}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.fillText(round===0?'게임 시작!':'라운드 시작',cx,cy-R*.38);
  ctx.font=`bold ${Math.round(fs*2.9)}px sans-serif`;
  ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(255,255,255,.15)';ctx.shadowBlur=16;
  ctx.fillText(`Round ${round+1}`,cx,cy+R*.06);
  ctx.shadowBlur=0;
  ctx.font=`${fs}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.fillText(`총 ${ROUNDS}라운드 중`,cx,cy+R*.38);
}

function drawRoundEnd(){
  // 'round' is already incremented → completed round number = round (1-indexed)
  const doneRound=round; // 1..4

  // Sort by current total
  const st=players.map((p,i)=>({
    name:p.name,color:p.color,
    tot:scores[i].reduce((a,b)=>a+b,0),
    last:scores[i][doneRound-1]||0, // this round's score
  })).sort((a,b)=>b.tot-a.tot);

  ctx.textAlign='center';
  const fs=Math.max(10,Math.round(R*.11));
  const rowH=Math.min(R*.24,(R*1.52)/st.length);
  const totalH=st.length*rowH;
  const sy=cy-totalH/2+rowH*.5; // center block vertically

  // Title
  ctx.font=`${Math.round(fs*.9)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.fillText(`Round ${doneRound} 완료`,cx,sy-rowH*.85);

  const M=['🥇','🥈','🥉'];

  st.forEach((s,i)=>{
    const y=sy+i*rowH;
    const isLast=i===st.length-1;

    // Highlight last place
    if(isLast){
      ctx.fillStyle='rgba(241,91,181,.18)';
      ctx.beginPath();
      ctx.rect(cx-R*.92,y-rowH*.42,R*1.84,rowH*.84);
      ctx.fill();
    }

    const medal=i<3?M[i]:`${i+1}`;
    const nameColor=isLast?'#f15bb5':'#fff';

    // Medal
    ctx.textAlign='right';
    ctx.font=`${Math.round(fs*.9)}px sans-serif`;
    ctx.fillStyle=isLast?'#f15bb5':'rgba(255,255,255,.55)';
    ctx.fillText(medal,cx-R*.72,y+fs*.35);

    // Color dot
    ctx.beginPath();ctx.arc(cx-R*.58,y,R*.05,0,Math.PI*2);
    ctx.fillStyle=s.color;ctx.fill();

    // Name
    ctx.textAlign='left';
    ctx.font=`bold ${Math.round(fs*1.05)}px sans-serif`;
    ctx.fillStyle=nameColor;
    ctx.fillText(s.name,cx-R*.47,y+fs*.35);

    // This round's score
    ctx.textAlign='right';
    ctx.font=`${Math.round(fs*.82)}px sans-serif`;
    ctx.fillStyle='rgba(255,255,255,.35)';
    ctx.fillText(`+${s.last}`,cx+R*.54,y+fs*.35);

    // Total
    ctx.font=`bold ${Math.round(fs*1.1)}px sans-serif`;
    ctx.fillStyle=s.color;
    ctx.fillText(s.tot,cx+R*.9,y+fs*.35);
  });

  // Last place warning
  if(st.length>0){
    const last=st[st.length-1];
    ctx.textAlign='center';
    ctx.font=`${Math.round(fs*.88)}px sans-serif`;
    ctx.fillStyle='#f15bb5';
    ctx.fillText(`⚠ 현재 꼴찌: ${last.name}`,cx,sy+totalH*.5+R*.15);
  }
}

// ═══ UI ═══
function updateHdr(){
  if(cP>=players.length)return;
  const p=players[cP];
  document.getElementById('cdot').style.background=p.color;
  document.getElementById('cname').textContent=p.name;
  document.getElementById('rnum').textContent=`${round+1} / ${ROUNDS}`;
}
function updateRoundDots(){
  document.getElementById('rdots').innerHTML=Array.from({length:ROUNDS},(_,i)=>{
    if(i<round) return`<div class="rdot done"></div>`;
    if(i===round) return`<div class="rdot cur"></div>`;
    return`<div class="rdot"></div>`;
  }).join('');
}
function updateBar(){
  document.getElementById('sbar').innerHTML=players.map((p,i)=>{
    const h=scores[i]||[];
    const tot=h.reduce((a,b)=>a+b,0);
    const act=i===cP&&!overlay;
    return`<div class="schip" style="border-color:${p.color}${act?'55':'22'};${act?`background:${p.color}18;`:''}">
      <div class="sdot" style="background:${p.color}"></div>
      <span style="font-weight:${act?700:500};color:${act?'#fff':'rgba(255,255,255,.55)'}">${p.name}</span>
      ${h.length?`<span style="font-weight:700;color:${p.color}">${tot}</span>`:''}
      ${h.length>1?`<span style="color:rgba(255,255,255,.22);font-size:10px">[${h.join('+')}]</span>`:''}
    </div>`;
  }).join('');
}

// ═══ RESULT ═══
function showResult(){
  const res=players.map((p,i)=>({
    name:p.name,color:p.color,
    tot:(scores[i]||[]).reduce((a,b)=>a+b,0),
    hist:scores[i]||[],
  })).sort((a,b)=>b.tot-a.tot);
  const M=['🥇','🥈','🥉'];
  const li=res.length-1;
  document.getElementById('rcontent').innerHTML=`
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:36px;margin-bottom:8px">🎯</div>
      <div style="font-size:20px;font-weight:800;margin-bottom:4px">게임 종료!</div>
      <div style="font-size:13px;color:rgba(255,255,255,.4)">${ROUNDS}라운드 합산 — 최저점 벌칙</div>
    </div>
    ${res.map((r,i)=>`
      <div class="rrow${i===li?' loser':''}">
        <span class="rrank">${i<3?M[i]:`${i+1}`}</span>
        <div style="width:10px;height:10px;border-radius:50%;background:${r.color};flex-shrink:0;margin-top:3px"></div>
        <div class="rname">
          ${r.name}${i===li?' <span style="font-size:11px;color:#f15bb5;margin-left:6px">← 벌칙!</span>':''}
          <span class="rsub">${r.hist.map((s,j)=>`R${j+1}: ${s}`).join(' · ')} → 합계 <strong>${r.tot}점</strong></span>
        </div>
        <span class="rscore" style="color:${r.color}">${r.tot}</span>
      </div>`).join('')}
    <div style="margin-top:16px;padding:14px;background:rgba(241,91,181,.07);border:1px solid rgba(241,91,181,.25);border-radius:12px;text-align:center">
      <div style="font-size:24px;margin-bottom:4px">💀 ${res[li].name}</div>
      <div style="font-size:13px;color:rgba(255,255,255,.5)">${res[li].tot}점으로 꼴찌. 벌칙을 받으세요!</div>
    </div>`;
  showPhase('ph-result');
}

function restartGame(){
  scores=players.map(()=>[]);
  round=0;cP=0;roundPins=[];dart=null;popup=null;overlay=null;
  showPhase('ph-game');
  resize();updateBar();updateHdr();updateRoundDots();
  cancelAnimationFrame(animId);loop();
  setTimeout(()=>beginRound(),450);
}

// ═══ INIT ═══
window.addEventListener('load',()=>setCount(4));
window.addEventListener('resize',()=>{
  if(document.getElementById('ph-game').classList.contains('active'))resize();
});
</script>
