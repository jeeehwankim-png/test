<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏊 수영 레이스 — 내기판</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0a1a2a;color:#fff;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:20px 16px;
}
.phase{display:none;width:100%;max-width:560px;}
.phase.active{display:block;}
.logo{font-size:26px;font-weight:700;margin-bottom:4px;}
.logo span{color:#4ECDC4;}
.tagline{font-size:13px;color:rgba(255,255,255,.42);margin-bottom:22px;line-height:1.65;}
.legend{display:flex;gap:14px;margin-bottom:22px;justify-content:center;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:5px 11px;color:rgba(255,255,255,.72);}
.count-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:22px;}
.count-label{font-size:15px;color:rgba(255,255,255,.6);}
.cnt-btn{width:40px;height:40px;border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.07);color:#fff;font-size:20px;cursor:pointer;
  border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.cnt-btn:hover{background:rgba(255,255,255,.13);}
.cnt-num{font-size:32px;font-weight:800;width:64px;text-align:center;color:#4ECDC4;}
.names-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.nrow{display:flex;align-items:center;gap:8px;}
.ndot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.nrow input{flex:1;min-width:0;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;padding:7px 10px;font-size:13px;color:#fff;font-family:inherit;outline:none;
  transition:border-color .15s;}
.nrow input:focus{border-color:rgba(255,255,255,.28);}
.nrow input::placeholder{color:rgba(255,255,255,.18);}
.btn{padding:11px 18px;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;
  font-weight:600;border:none;transition:transform .08s;}
.btn:active{transform:scale(.97);}
.bp{background:#4ECDC4;color:#0a1a2a;width:100%;}
.bs{background:rgba(255,255,255,.07);color:rgba(255,255,255,.72);
  border:1px solid rgba(255,255,255,.12);}
.brow{display:flex;gap:10px;margin-top:12px;}
canvas{display:block;width:100%;border-radius:14px;}
.rrow{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:9px;font-size:13px;margin-bottom:6px;}
.rrow.loser{border-color:rgba(241,91,181,.4);background:rgba(241,91,181,.07);}
.rrank{font-size:20px;width:30px;text-align:center;flex-shrink:0;}
.rname{flex:1;font-weight:600;line-height:1.6;}
.rsub{font-size:11px;color:rgba(255,255,255,.35);display:block;font-weight:400;}
.ad{width:100%;max-width:560px;height:54px;border:1px dashed rgba(255,255,255,.07);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:rgba(255,255,255,.13);margin-bottom:14px;}
.hlink{display:inline-flex;align-items:center;gap:5px;font-size:12px;
  color:rgba(255,255,255,.35);text-decoration:none;margin-bottom:14px;transition:color .2s;}
.hlink:hover{color:rgba(255,255,255,.7);}
</style>
</head>
<body>

<div class="ad">광고 영역 320×50</div>

<!-- SETUP -->
<div class="phase active" id="ph-input">
  <a href="index.html" class="hlink">← 내기판 홈</a>
  <div class="logo">🏊 수영 <span>레이스</span></div>
  <div class="tagline">장애물들이 레인을 가로질러 움직인다!<br>꼴찌로 들어오는 사람이 벌칙.</div>
  <div class="legend">
    <div class="leg-item">🦈 상어 — 강하게 튕겨냄</div>
    <div class="leg-item">💜 해파리 — 속도 저하</div>
    <div class="leg-item">🌀 소용돌이 — 역류 발생</div>
  </div>
  <div class="count-row">
    <span class="count-label">인원수</span>
    <div style="display:flex;align-items:center;">
      <button class="cnt-btn" onclick="setCount(playerCount-1)">−</button>
      <div class="cnt-num" id="cnt-display">4</div>
      <button class="cnt-btn" onclick="setCount(playerCount+1)">+</button>
    </div>
    <span class="count-label">명</span>
  </div>
  <div class="names-grid" id="nlist"></div>
  <button class="btn bp" onclick="startGame()">🏊 레이스 시작</button>
</div>

<!-- GAME -->
<div class="phase" id="ph-game">
  <canvas id="gc"></canvas>
</div>

<!-- RESULT -->
<div class="phase" id="ph-result">
  <div id="rcontent"></div>
  <div class="brow">
    <a href="index.html" class="btn bs"
       style="display:flex;align-items:center;justify-content:center;text-decoration:none;flex:1;">
      🏠 홈으로
    </a>
    <button class="btn bs" onclick="showPhase('ph-input')">처음으로</button>
    <button class="btn bp" onclick="restartGame()">다시 레이스 →</button>
  </div>
</div>

<script>
// ══════════════ CONSTANTS ══════════════
const COLORS = ['#FF6B6B','#4ECDC4','#F7DC6F','#5DADE2','#C39BD3',
                '#FD9644','#2ECC71','#EC407A','#00BCD4','#FF7043'];
const RACE_LEN  = 2400;
const VIS_RANGE = 520;
const BASE_SPD  = 2.6;
const SPD_VAR   = 1.0;
const HEADER_H  = 44;
const MAP_H     = 14;
const NAME_W    = 66;
const COLL_X    = 30; // world-unit tolerance for X collision

// ══════════════ STATE ══════════════
let playerCount = 4;
let nameInputs  = [];
let swimmers    = [];
let obstacles   = []; // shared global obstacles that move vertically
let gameState   = 'countdown';
let cdVal = 3, cdTimer = 0;
let camX = 0;
let finishCount = 0;
let doneTimer   = 0;
let animId;
let cv, ctx, viewW, laneH, totalLaneH;

// ══════════════ SETUP ══════════════
function setCount(n) {
  playerCount = Math.max(2, Math.min(10, n));
  document.getElementById('cnt-display').textContent = playerCount;
  const old = [...document.querySelectorAll('#nlist input')].map(e => e.value);
  nameInputs = Array.from({length: playerCount}, (_, i) => old[i] || '');
  document.getElementById('nlist').innerHTML = nameInputs.map((v, i) => `
    <div class="nrow">
      <div class="ndot" style="background:${COLORS[i%10]}"></div>
      <input type="text" placeholder="${i+1}P" maxlength="8"
        value="${v}" oninput="nameInputs[${i}]=this.value">
    </div>`).join('');
}

function showPhase(id) {
  document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══════════════ OBSTACLE GENERATION ══════════════
// Obstacles move vertically across ALL lanes (shared)
// Positions spaced across the race length
function genObstacles(numPlayers) {
  // 5-6 obstacle gates spread across the race
  const centers = [370, 640, 920, 1200, 1490, 1790];
  const useCount = numPlayers >= 6 ? 6 : 5;
  const types = ['shark', 'jellyfish', 'vortex'];

  return centers.slice(0, useCount).map((c, i) => {
    // Balance: 2 sharks, 2 jellyfish, 1-2 vortex
    const forcedType = i < 2 ? 'shark' : i < 4 ? 'jellyfish' : 'vortex';
    const type = Math.random() < 0.4 ? types[Math.floor(Math.random()*3)] : forcedType;
    return {
      wx:    c + Math.round((Math.random()-0.5)*90),
      type,
      // Oscillation speed (radians/sec)
      speed: type === 'shark'     ? 1.0 + Math.random()*0.8
           : type === 'jellyfish' ? 0.2 + Math.random()*0.25
           : 0.45 + Math.random()*0.4,
      phase:     Math.random() * Math.PI * 2,
      laneFloat: Math.random() * (numPlayers - 1), // current vertical lane pos
      hitCooldowns: {},   // { swimmerIndex: framesRemaining }
    };
  });
}

// Collision radius in lane units
function obsRadius(type) {
  return type === 'shark' ? 0.48 : type === 'jellyfish' ? 0.55 : 1.1;
}

// ══════════════ BUILD SWIMMERS ══════════════
function buildSwimmers() {
  const els   = [...document.querySelectorAll('#nlist input')];
  const names = els.map((el, i) => el.value.trim() || `${i+1}P`);
  return names.map((name, i) => ({
    name,
    color:     COLORS[i % 10],
    x:         0,
    tendency:  (Math.random()-0.5)*0.7,
    speedMult: 1,
    stunTimer: 0,   // frames of hard stop (shark/vortex)
    slowTimer: 0,   // frames of speed reduction (jellyfish)
    hitBy:     null,
    finished:  false,
    finishRank:0,
    phase:     Math.random()*Math.PI*2,
    particles: [],
  }));
}

// ══════════════ GAME LIFECYCLE ══════════════
function startGame() {
  swimmers    = buildSwimmers();
  obstacles   = genObstacles(swimmers.length);
  finishCount = 0;
  gameState   = 'countdown';
  cdVal=3; cdTimer=0; camX=0; doneTimer=0;
  showPhase('ph-game');
  resize();
  cancelAnimationFrame(animId);
  loop();
}

function restartGame() {
  swimmers = swimmers.map(s => ({
    ...s, x:0, tendency:(Math.random()-0.5)*0.7, speedMult:1,
    stunTimer:0, slowTimer:0, hitBy:null,
    finished:false, finishRank:0, phase:Math.random()*Math.PI*2, particles:[],
  }));
  obstacles   = genObstacles(swimmers.length);
  finishCount = 0;
  gameState   = 'countdown';
  cdVal=3; cdTimer=0; camX=0; doneTimer=0;
  showPhase('ph-game');
  resize();
  cancelAnimationFrame(animId);
  loop();
}

function resize() {
  cv   = document.getElementById('gc');
  ctx  = cv.getContext('2d');
  const w = Math.min(window.innerWidth-32, 560);
  laneH      = Math.min(80, Math.max(46, Math.floor(390/swimmers.length)));
  totalLaneH = laneH * swimmers.length;
  cv.width   = w;
  cv.height  = HEADER_H + totalLaneH + MAP_H;
  viewW      = w - NAME_W;
}

// ══════════════ HELPERS ══════════════
function worldToSX(wx)  { return NAME_W + (wx - camX) / VIS_RANGE * viewW; }
function laneY(i)        { return HEADER_H + i*laneH + laneH/2; }
function laneYF(f)       { return HEADER_H + f*laneH + laneH/2; } // float lane index
function hexRgb(hex)    { return [1,3,5].map(o=>parseInt(hex.slice(o,o+2),16)).join(','); }

// ══════════════ GAME LOOP ══════════════
function loop() { update(); draw(); animId = requestAnimationFrame(loop); }

// ══════════════ UPDATE ══════════════
function update() {
  if (gameState === 'countdown') {
    if (++cdTimer >= 72) { cdTimer=0; cdVal--; if (cdVal<0) gameState='racing'; }
    return;
  }
  if (gameState === 'done') {
    if (++doneTimer > 115) { cancelAnimationFrame(animId); setTimeout(showResult,250); }
    return;
  }

  // ── Obstacles: update vertical position & detect collision ──
  const t = Date.now()*0.001;
  const N = swimmers.length;
  const half = (N-1)/2;

  obstacles.forEach(obs => {
    // Tick cooldowns
    for (const k in obs.hitCooldowns) {
      if (obs.hitCooldowns[k] > 0) obs.hitCooldowns[k]--;
    }

    // Vertical movement (sine-based, different character per type)
    if (obs.type === 'shark') {
      // Fast, full range — sweeps entire pool
      obs.laneFloat = half + Math.sin(t*obs.speed + obs.phase) * half;
    } else if (obs.type === 'jellyfish') {
      // Slow, partial range — drifts gently around center
      obs.laneFloat = half + Math.sin(t*obs.speed + obs.phase) * (half*0.65);
    } else {
      // Vortex: compound sine — erratic, unpredictable
      obs.laneFloat = half
        + Math.sin(t*obs.speed + obs.phase)          * half * 0.72
        + Math.sin(t*obs.speed*1.73 + obs.phase*1.3) * half * 0.28;
    }
    obs.laneFloat = Math.max(0, Math.min(N-1, obs.laneFloat));

    // Collision against each swimmer
    const r = obsRadius(obs.type);
    swimmers.forEach((s, si) => {
      if (s.finished || s.stunTimer > 0) return;
      if ((obs.hitCooldowns[si]||0) > 0) return;
      if (Math.abs(s.x - obs.wx) > COLL_X) return;
      if (Math.abs(obs.laneFloat - si) >= r) return;

      // HIT!
      obs.hitCooldowns[si] = 200;
      s.hitBy = obs.type;

      if (obs.type === 'shark') {
        s.stunTimer = 105;
        spawnBurst(s, obs.wx, laneY(si), '#e74c3c');
        spawnBurst(s, obs.wx, laneY(si), '#fff');
      } else if (obs.type === 'jellyfish') {
        s.slowTimer  = 165;
        s.speedMult  = 0.28;
        spawnBurst(s, obs.wx, laneY(si), '#9b59b6');
      } else { // vortex
        s.stunTimer = 75;
        spawnBurst(s, obs.wx, laneY(si), '#00bcd4');
      }
    });
  });

  // ── Swimmers ──
  swimmers.forEach((s, si) => {
    // Particles
    s.particles = s.particles.filter(p => {
      p.wx+=p.vwx; p.y+=p.vy; p.vy+=0.12; return --p.life>0;
    });
    if (s.finished) return;

    if (s.slowTimer > 0) s.slowTimer--;

    if (s.stunTimer > 0) {
      s.stunTimer--;
      // Pushback: vortex pushes harder
      s.x = Math.max(0, s.x - (s.hitBy==='vortex' ? 1.3 : 0.65));
      s.phase += 0.012;
      return;
    }

    // Speed recovery
    if (s.slowTimer > 0) {
      s.speedMult = Math.min(s.speedMult, 0.30);
    } else {
      s.speedMult = Math.min(1, s.speedMult + 0.022);
    }

    // Natural swimming movement
    s.tendency += (Math.random()-0.5)*0.06;
    s.tendency  = Math.max(-0.8, Math.min(0.8, s.tendency));
    const spd = (BASE_SPD + s.tendency + (Math.random()-0.5)*SPD_VAR) * s.speedMult;
    s.x    += Math.max(0.06, spd);
    s.phase += 0.085;

    if (s.x >= RACE_LEN) {
      s.x = RACE_LEN; s.finished = true; s.finishRank = ++finishCount;
      spawnBurst(s, RACE_LEN, laneY(si), s.color);
      spawnBurst(s, RACE_LEN, laneY(si), '#FFD700');
    }
  });

  if (gameState==='racing' && swimmers.every(s=>s.finished)) gameState='done';

  // Camera: smooth follow of frontrunner
  const racing = swimmers.filter(s=>!s.finished);
  const leader = (racing.length ? racing : swimmers).reduce((a,b)=>a.x>b.x?a:b);
  const tgtCam = Math.max(0, Math.min(RACE_LEN-VIS_RANGE, leader.x-VIS_RANGE*0.27));
  camX += (tgtCam-camX)*0.065;
}

function spawnBurst(s, wx, sy, color) {
  for (let k=0;k<14;k++) {
    s.particles.push({
      wx, y:sy,
      vwx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*5-1,
      life:40+Math.floor(Math.random()*25),
      color,
    });
  }
}

// ══════════════ DRAW ══════════════
function draw() {
  if (!ctx) return;
  ctx.clearRect(0,0,cv.width,cv.height);
  drawPool();
  drawObstacleWarnings();  // danger column + approach flash
  drawObstacles();
  drawFinishLine();
  drawSwimmers();
  drawNamePanel();
  drawHeader();
  drawMinimap();
  if (gameState==='countdown') drawCountdown();
}

// ── Pool ──
function drawPool() {
  const t = Date.now()*0.001;
  for (let i=0;i<swimmers.length;i++) {
    const y = HEADER_H + i*laneH;
    ctx.fillStyle = i%2===0 ? '#0f4e78' : '#0d4368';
    ctx.fillRect(NAME_W, y, viewW, laneH);

    // Light caustic shimmer
    for (let wx=NAME_W; wx<cv.width; wx+=50) {
      const wy = y + laneH*0.45 + Math.sin((wx*0.04)+t*1.8+i*1.3)*4;
      ctx.beginPath();
      ctx.moveTo(wx, wy);
      ctx.lineTo(wx+40, wy+Math.sin((wx*0.04)+t*1.8+i*1.3+0.6)*3);
      ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1; ctx.stroke();
    }

    // Lane rope divider
    if (i>0) {
      const ry = HEADER_H+i*laneH;
      const ropeCol = i%2===0?'#FF7043':'#42A5F5';
      for (let rx=NAME_W+10;rx<cv.width;rx+=18) {
        ctx.beginPath(); ctx.arc(rx,ry,3.5,0,Math.PI*2);
        ctx.fillStyle=ropeCol; ctx.fill();
      }
      ctx.setLineDash([6,6]);
      ctx.beginPath(); ctx.moveTo(NAME_W,ry); ctx.lineTo(cv.width,ry);
      ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1; ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  // Pool walls
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(NAME_W, HEADER_H, viewW, 3);
  ctx.fillRect(NAME_W, HEADER_H+totalLaneH-3, viewW, 3);
  // Start wall
  const startSX = worldToSX(0);
  if (startSX>NAME_W-4 && startSX<cv.width) {
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.fillRect(startSX-3,HEADER_H,6,totalLaneH);
  }
}

// ── Obstacle "danger column" background + approach warning ──
function drawObstacleWarnings() {
  const t = Date.now()*0.001;
  obstacles.forEach(obs => {
    const sx = worldToSX(obs.wx);
    if (sx < NAME_W-80 || sx > cv.width+30) return;

    // Vertical danger column
    const col = obs.type==='shark'     ? 'rgba(231,76,60,0.09)'
              : obs.type==='jellyfish' ? 'rgba(155,89,182,0.09)'
              :                          'rgba(0,188,212,0.09)';
    ctx.fillStyle = col;
    ctx.fillRect(sx-4, HEADER_H, 8, totalLaneH);

    // Flash swimmer lane if collision imminent
    const r = obsRadius(obs.type);
    swimmers.forEach((s, si) => {
      if (s.finished || s.stunTimer>0) return;
      const dx = s.x - obs.wx;
      if (dx < 0 || dx > 120) return; // only warn if swimmer is approaching
      if (Math.abs(obs.laneFloat - si) >= r) return;
      const alpha = (1 - dx/120) * 0.22;
      const warnCol = obs.type==='shark'     ? `rgba(231,76,60,${alpha})`
                    : obs.type==='jellyfish' ? `rgba(155,89,182,${alpha})`
                    :                          `rgba(0,188,212,${alpha})`;
      ctx.fillStyle = warnCol;
      const ly = HEADER_H + si*laneH;
      ctx.fillRect(NAME_W, ly+2, viewW, laneH-4);
    });
  });
}

// ── Draw each obstacle ──
function drawObstacles() {
  const t = Date.now()*0.001;
  obstacles.forEach(obs => {
    const sx = worldToSX(obs.wx);
    if (sx < NAME_W-70 || sx > cv.width+50) return;
    const sy   = laneYF(obs.laneFloat);
    const size = obs.type==='vortex' ? laneH*0.52 : laneH*0.42;
    if (obs.type==='shark')       drawShark(sx, sy, size, t);
    else if (obs.type==='jellyfish') drawJellyfish(sx, sy, size, t);
    else                           drawVortex(sx, sy, size, t);
  });
}

function drawShark(sx, sy, size, t) {
  ctx.save();
  // Warning pulse glow
  const pulse = 0.5+Math.abs(Math.sin(t*3))*0.5;
  const gl = ctx.createRadialGradient(sx,sy,0,sx,sy,size*1.6);
  gl.addColorStop(0,`rgba(231,76,60,${0.15*pulse})`);
  gl.addColorStop(1,'rgba(231,76,60,0)');
  ctx.beginPath(); ctx.arc(sx,sy,size*1.6,0,Math.PI*2);
  ctx.fillStyle=gl; ctx.fill();

  // Body
  ctx.beginPath();
  ctx.ellipse(sx, sy+size*0.12, size*0.88, size*0.33, 0, 0, Math.PI*2);
  ctx.fillStyle='#2c3e50'; ctx.fill();

  // Dorsal fin
  ctx.beginPath();
  ctx.moveTo(sx-size*0.18, sy-size*0.05);
  ctx.lineTo(sx+size*0.06, sy-size*1.08);
  ctx.lineTo(sx+size*0.54, sy-size*0.05);
  ctx.closePath();
  ctx.fillStyle='#2c3e50'; ctx.fill();

  // Tail fin
  ctx.beginPath();
  ctx.moveTo(sx-size*0.7, sy+size*0.08);
  ctx.lineTo(sx-size*1.08, sy-size*0.28);
  ctx.lineTo(sx-size*0.75, sy+size*0.13);
  ctx.lineTo(sx-size*1.05, sy+size*0.48);
  ctx.closePath();
  ctx.fillStyle='#2c3e50'; ctx.fill();

  // Eye
  ctx.beginPath(); ctx.arc(sx+size*0.36,sy-size*0.02,size*0.1,0,Math.PI*2);
  ctx.fillStyle='#000'; ctx.fill();
  ctx.beginPath(); ctx.arc(sx+size*0.38,sy-size*0.04,size*0.04,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.fill();

  // Highlight
  ctx.beginPath();
  ctx.ellipse(sx+size*0.05,sy-size*0.06,size*0.32,size*0.1,-0.3,0,Math.PI*2);
  ctx.fillStyle='rgba(100,160,220,0.2)'; ctx.fill();

  ctx.restore();
}

function drawJellyfish(sx, sy, size, t) {
  ctx.save();
  const pulse = 1+Math.sin(t*2.5)*0.09;
  const r = size*pulse;

  // Outer glow
  const gl = ctx.createRadialGradient(sx,sy,0,sx,sy,size*2.2);
  gl.addColorStop(0,'rgba(155,89,182,0.22)');
  gl.addColorStop(1,'rgba(155,89,182,0)');
  ctx.beginPath(); ctx.arc(sx,sy,size*2.2,0,Math.PI*2);
  ctx.fillStyle=gl; ctx.fill();

  // Tentacles
  for (let k=0;k<6;k++) {
    const tx = sx-r+(k/5)*r*2;
    const w1 = Math.sin(t*1.5+k*0.8)*size*0.42;
    const w2 = Math.sin(t*2.0+k*0.5+1)*size*0.26;
    ctx.beginPath();
    ctx.moveTo(tx, sy+r*0.3);
    ctx.bezierCurveTo(tx+w1,sy+r+size*0.4, tx+w2,sy+r+size*0.9, tx+w1*0.5,sy+r+size*1.45);
    ctx.strokeStyle='rgba(200,120,255,0.42)';
    ctx.lineWidth=1.8; ctx.lineCap='round'; ctx.stroke();
  }

  // Bell body
  ctx.beginPath();
  ctx.arc(sx,sy,r,Math.PI,0);
  ctx.lineTo(sx+r, sy+r*0.32);
  ctx.bezierCurveTo(sx+r*0.5,sy+r*0.62, sx-r*0.5,sy+r*0.62, sx-r,sy+r*0.32);
  ctx.closePath();
  ctx.fillStyle='rgba(155,89,182,0.55)'; ctx.fill();
  ctx.strokeStyle='rgba(210,160,255,0.72)'; ctx.lineWidth=1.5; ctx.stroke();

  // Inner radial lines
  ctx.beginPath();
  ctx.arc(sx,sy,r*0.55,Math.PI,0);
  ctx.strokeStyle='rgba(255,200,255,0.28)'; ctx.lineWidth=1; ctx.stroke();

  ctx.restore();
}

function drawVortex(sx, sy, size, t) {
  ctx.save();
  const rot = t*2.3;

  // Wide glow
  const gl = ctx.createRadialGradient(sx,sy,0,sx,sy,size*2.5);
  gl.addColorStop(0,'rgba(0,188,212,0.28)');
  gl.addColorStop(0.55,'rgba(0,100,200,0.1)');
  gl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(sx,sy,size*2.5,0,Math.PI*2);
  ctx.fillStyle=gl; ctx.fill();

  // Three spinning arcs (outer → inner)
  for (let r=3;r>=1;r--) {
    ctx.beginPath();
    ctx.arc(sx,sy,size*r*0.38, rot+r*0.5, rot+r*0.5+Math.PI*1.55);
    ctx.strokeStyle=`rgba(0,188,212,${0.68/r})`;
    ctx.lineWidth=r*2.2+1; ctx.lineCap='round'; ctx.stroke();
  }

  // Counter-rotating inner arc
  ctx.beginPath();
  ctx.arc(sx,sy,size*0.28, -rot*1.5, -rot*1.5+Math.PI*1.2);
  ctx.strokeStyle='rgba(160,240,255,0.65)'; ctx.lineWidth=3; ctx.stroke();

  // Core
  ctx.beginPath(); ctx.arc(sx,sy,size*0.16,0,Math.PI*2);
  ctx.fillStyle='rgba(0,220,255,0.85)'; ctx.fill();

  ctx.restore();
}

// ── Finish line ──
function drawFinishLine() {
  const sx = worldToSX(RACE_LEN);
  if (sx>cv.width||sx<NAME_W) return;
  const sh=10, rows=Math.floor(totalLaneH/sh);
  for (let r=0;r<rows;r++) {
    for (let c=0;c<2;c++) {
      ctx.fillStyle=(r+c)%2===0?'#fff':'#111';
      ctx.fillRect(sx-4+c*4,HEADER_H+r*sh,4,sh);
    }
  }
  ctx.shadowColor='#FFD700'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.moveTo(sx,HEADER_H); ctx.lineTo(sx,HEADER_H+totalLaneH);
  ctx.strokeStyle='rgba(255,215,0,0.55)'; ctx.lineWidth=2; ctx.stroke();
  ctx.shadowBlur=0;
  ctx.font='bold 9px sans-serif'; ctx.fillStyle='#FFD700';
  ctx.textAlign='center'; ctx.fillText('FINISH',sx,HEADER_H-5);
}

// ── Swimmers ──
function drawSwimmers() {
  swimmers.forEach((s,i) => {
    // Particles
    s.particles.forEach(p => {
      const px=worldToSX(p.wx);
      if (px<NAME_W-10||px>cv.width+10) return;
      ctx.beginPath(); ctx.arc(px,p.y,3,0,Math.PI*2);
      ctx.fillStyle=p.color; ctx.globalAlpha=Math.max(0,p.life/60); ctx.fill();
    });
    ctx.globalAlpha=1;

    const sx = worldToSX(s.x);
    const sy = laneY(i);
    if (sx>NAME_W-40&&sx<cv.width+40) drawSwimmer(s,sx,sy);

    // Finish rank badge
    if (s.finished) {
      const bx=worldToSX(RACE_LEN)+10;
      if (bx>NAME_W&&bx<cv.width-5) {
        const M=['🥇','🥈','🥉'];
        ctx.font='14px serif'; ctx.textAlign='left';
        ctx.fillText(s.finishRank<=3?M[s.finishRank-1]:`${s.finishRank}위`,bx,sy+5);
      }
    }
  });
}

function drawSwimmer(s, sx, sy) {
  ctx.save(); ctx.translate(sx,sy);
  const ph = s.phase;

  // Effect aura
  if (s.stunTimer>0) {
    const a=s.stunTimer/105;
    ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2);
    ctx.fillStyle=s.hitBy==='shark'?`rgba(231,76,60,${a*0.25})`:`rgba(0,188,212,${a*0.25})`;
    ctx.fill();
  }
  if (s.slowTimer>0&&s.stunTimer===0) {
    ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2);
    ctx.fillStyle=`rgba(155,89,182,${(s.slowTimer/165)*0.28})`; ctx.fill();
  }

  // Wake bubbles
  for (let k=1;k<=4;k++) {
    const bx=-k*18;
    if (sx+bx<NAME_W) break;
    ctx.beginPath();
    ctx.arc(bx+Math.sin(ph+k)*3, Math.cos(ph+k*1.3)*4, 3.5-k*0.5, 0, Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${0.16/k})`; ctx.fill();
  }

  ctx.lineCap='round';

  // Kick feet
  const kick=Math.sin(ph*2)*8;
  ctx.lineWidth=2.5; ctx.strokeStyle=s.color;
  ctx.beginPath(); ctx.moveTo(-14,3); ctx.lineTo(-23,3+kick); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-14,3); ctx.lineTo(-23,3-kick); ctx.stroke();

  // Body
  ctx.beginPath(); ctx.ellipse(-2,1,13,5,-0.13,0,Math.PI*2);
  ctx.fillStyle=s.color; ctx.fill();

  // Recovery arm (above water)
  const rec=Math.sin(ph+Math.PI);
  ctx.beginPath(); ctx.moveTo(-4,-3);
  ctx.quadraticCurveTo(-12+rec*5,-14-Math.abs(rec)*3,-8-rec*7,-7);
  ctx.strokeStyle=`rgba(${hexRgb(s.color)},0.62)`; ctx.lineWidth=3; ctx.stroke();

  // Forward arm (in water)
  const fwd=Math.sin(ph);
  ctx.beginPath(); ctx.moveTo(5,0);
  ctx.quadraticCurveTo(13,fwd*5,19,fwd*2+1);
  ctx.strokeStyle=s.color; ctx.lineWidth=3.5; ctx.stroke();

  // Head
  ctx.beginPath(); ctx.arc(14,-3,7,0,Math.PI*2);
  ctx.fillStyle=s.color; ctx.fill();
  ctx.beginPath(); ctx.ellipse(17,-2,4.5,3,-0.2,0,Math.PI*2);
  ctx.fillStyle='rgba(0,40,90,0.6)'; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1; ctx.stroke();

  // Stun / slow icon
  if (s.stunTimer>0) {
    ctx.font='14px serif'; ctx.textAlign='center';
    ctx.fillText(s.hitBy==='shark'?'💫':'🌀',0,-22);
  } else if (s.slowTimer>0) {
    ctx.font='12px serif'; ctx.textAlign='center'; ctx.fillText('💜',0,-20);
  }

  // Name tag
  ctx.font='bold 8px sans-serif'; ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=3;
  ctx.fillText(s.name,0,18); ctx.shadowBlur=0;

  ctx.restore();
}

// ── Name panel ──
function drawNamePanel() {
  ctx.fillStyle='rgba(4,16,28,0.88)';
  ctx.fillRect(0,HEADER_H,NAME_W,totalLaneH);
  ctx.fillStyle='rgba(255,255,255,0.07)';
  ctx.fillRect(NAME_W-1,HEADER_H,1,totalLaneH);

  swimmers.forEach((s,i) => {
    const sy=laneY(i);

    // Effect tint on name panel
    if (s.stunTimer>0) {
      ctx.fillStyle=s.hitBy==='shark'?`rgba(231,76,60,${s.stunTimer/105*0.35})`:`rgba(0,188,212,${s.stunTimer/75*0.3})`;
      ctx.fillRect(1,HEADER_H+i*laneH+1,NAME_W-2,laneH-2);
    } else if (s.slowTimer>0) {
      ctx.fillStyle=`rgba(155,89,182,${s.slowTimer/165*0.3})`;
      ctx.fillRect(1,HEADER_H+i*laneH+1,NAME_W-2,laneH-2);
    }

    // Color dot
    ctx.beginPath(); ctx.arc(11,sy,5,0,Math.PI*2);
    ctx.fillStyle=s.color; ctx.fill();

    // Name
    ctx.font='bold 10px sans-serif'; ctx.fillStyle='#fff';
    ctx.textAlign='left';
    ctx.shadowColor='#000'; ctx.shadowBlur=2;
    ctx.fillText(s.name.substring(0,5),22,sy+4); ctx.shadowBlur=0;

    // Effect icon / rank
    if (s.finished) {
      const M=['🥇','🥈','🥉'];
      ctx.font='10px serif'; ctx.textAlign='right';
      ctx.fillText(s.finishRank<=3?M[s.finishRank-1]:`${s.finishRank}위`,NAME_W-4,sy+4);
    } else if (s.stunTimer>0||s.slowTimer>0) {
      ctx.font='10px serif'; ctx.textAlign='center';
      const icon=s.stunTimer>0?(s.hitBy==='shark'?'🦈':'🌀'):'💜';
      ctx.fillText(icon,11,sy-10);
    }
  });
}

// ── Header ──
function drawHeader() {
  ctx.fillStyle='rgba(4,14,26,0.93)';
  ctx.fillRect(0,0,cv.width,HEADER_H);
  ctx.fillStyle='rgba(255,255,255,0.07)';
  ctx.fillRect(0,HEADER_H-1,cv.width,1);

  const leader=swimmers.reduce((a,b)=>a.x>b.x?a:b);
  const prog=Math.min(1,leader.x/RACE_LEN);

  ctx.fillStyle='rgba(255,255,255,0.07)';
  ctx.fillRect(NAME_W,16,viewW,10);
  const g=ctx.createLinearGradient(NAME_W,0,NAME_W+viewW*prog,0);
  g.addColorStop(0,'#4ECDC4'); g.addColorStop(1,'#00BCD4');
  ctx.fillStyle=g; ctx.fillRect(NAME_W,16,viewW*prog,10);

  ctx.font='bold 10px sans-serif'; ctx.textAlign='left';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('🏊 수영 레이스',NAME_W,12);
  ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillText(`${Math.round(prog*100)}%`,cv.width-5,12);
}

// ── Mini-map ──
function drawMinimap() {
  const my=HEADER_H+totalLaneH;
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(NAME_W,my,viewW,MAP_H);

  // Finish
  ctx.fillStyle='rgba(255,215,0,0.6)';
  ctx.fillRect(NAME_W+viewW-2,my,2,MAP_H);

  // Camera viewport
  const vL=NAME_W+(camX/RACE_LEN)*viewW;
  const vR=NAME_W+((camX+VIS_RANGE)/RACE_LEN)*viewW;
  ctx.fillStyle='rgba(255,255,255,0.07)';
  ctx.fillRect(vL,my,vR-vL,MAP_H);
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1;
  ctx.strokeRect(vL,my,vR-vL,MAP_H);

  // Obstacle positions (colored markers)
  obstacles.forEach(obs => {
    const mx = NAME_W+(obs.wx/RACE_LEN)*viewW;
    const col = obs.type==='shark'?'#e74c3c'
              : obs.type==='jellyfish'?'#9b59b6'
              : '#00bcd4';
    ctx.fillStyle=col;
    ctx.fillRect(mx-1,my,2,MAP_H);
  });

  // Swimmer dots
  swimmers.forEach(s => {
    const mx=NAME_W+Math.min(1,s.x/RACE_LEN)*viewW;
    ctx.beginPath(); ctx.arc(mx,my+MAP_H/2,3,0,Math.PI*2);
    ctx.fillStyle=s.color; ctx.fill();
  });
}

// ── Countdown ──
function drawCountdown() {
  ctx.fillStyle='rgba(4,14,26,0.82)';
  ctx.fillRect(0,0,cv.width,cv.height);
  ctx.textAlign='center';
  const cy=cv.height/2+10;
  if (cdVal>0) {
    ctx.font=`bold ${Math.round(cv.width*0.22)}px sans-serif`;
    ctx.shadowColor='rgba(78,205,196,0.55)'; ctx.shadowBlur=22;
    ctx.fillStyle='#fff'; ctx.fillText(cdVal,cv.width/2,cy);
  } else {
    ctx.font=`bold ${Math.round(cv.width*0.12)}px sans-serif`;
    ctx.shadowColor='rgba(78,205,196,0.7)'; ctx.shadowBlur=25;
    ctx.fillStyle='#4ECDC4'; ctx.fillText('출발! 🏊',cv.width/2,cy);
  }
  ctx.shadowBlur=0;
}

// ══════════════ RESULT ══════════════
function showResult() {
  const sorted=[...swimmers].sort((a,b)=>a.finishRank-b.finishRank);
  const li=sorted.length-1;
  const M=['🥇','🥈','🥉'];
  document.getElementById('rcontent').innerHTML=`
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:38px;margin-bottom:8px">🏊</div>
      <div style="font-size:20px;font-weight:800;margin-bottom:4px">레이스 종료!</div>
      <div style="font-size:13px;color:rgba(255,255,255,.4)">꼴찌 입장 선수가 벌칙을 받습니다</div>
    </div>
    ${sorted.map((s,i)=>`
      <div class="rrow${i===li?' loser':''}">
        <span class="rrank">${i<3?M[i]:i+1}</span>
        <div style="width:10px;height:10px;border-radius:50%;background:${s.color};
          flex-shrink:0;margin-top:3px"></div>
        <div class="rname">
          ${s.name}${i===li?' <span style="font-size:11px;color:#f15bb5;margin-left:6px">← 벌칙!</span>':''}
          <span class="rsub">${i===0?'🏆 1등 완주!':i===li?'💀 꼴찌...':i+1+'위 완주'}</span>
        </div>
      </div>`).join('')}
    <div style="margin-top:16px;padding:14px;background:rgba(241,91,181,.07);
      border:1px solid rgba(241,91,181,.3);border-radius:12px;text-align:center;">
      <div style="font-size:26px;margin-bottom:4px">💀 ${sorted[li].name}</div>
      <div style="font-size:13px;color:rgba(255,255,255,.5)">꼴찌로 들어왔습니다. 벌칙을 받으세요!</div>
    </div>`;
  showPhase('ph-result');
}

// ══════════════ INIT ══════════════
window.addEventListener('load',()=>setCount(4));
window.addEventListener('resize',()=>{
  if (document.getElementById('ph-game').classList.contains('active')) resize();
});
</script>
